<html>
<head>
    <title>RESERVATION FORM</title>
</head>

<body>

<center>
    <h1><u>RESERVATION FORM</u></h1>
</center>

<form>



<tr>
    <td><b>CONTACT INFORMATION</b></td>
</tr>
<br>
<tr>
    <td>
     <input type="text" name="fname" placeholder="FIRST NAME" size="30">
    </td>
    <br>
    <br>
    <td>
      <input type="text" name="lname" placeholder="LAST NAME" size="30">
    </td>
</tr>

    <table cellpadding="8">
    
<tr>
    <td><b>EMAIL ADDRESS</b></td>
</tr>

<tr>
    <td>
        <input type="email" name="email" placeholder="Username@gmail.com" size="90">
    </td>
</tr>

<tr>
    <td><b>PHONE NUMBER</b></td>
</tr>

<tr>
    <td>
        <input type="tel" name="phone" placeholder="CONTACT NUMBER" size="90">
    </td>
</tr>

<tr>
    <td><b>NUMBER OF GUESTS</b></td>
</tr>

<tr>
    <td>
        <input type="number" name="guests">
    </td>
</tr>

<tr>
    <td><b>GENDER OF GUEST</b></td>
</tr>

<tr>
    <td>
        <input type="radio" id="MALE" name="gender" value="MALE">
        <label for="MALE"><i>MALE</i></label><br>

        <input type="radio" id="FEMALE" name="gender" value="FEMALE">
        <label for="FEMALE"><i>FEMALE</i></label><br>

        <input type="radio" id="OTHER" name="gender" value="OTHER">
        <label for="OTHER"><i>OTHER</i></label>
    </td>
</tr>

<tr>
    <td><b>CHECK-IN DATE</b></td>
</tr>

<tr>
    <td>
        <input type="date" name="checkin">
    </td>
</tr>

<tr>
    <td><b>CHECKED-OUT DATE</b></td>
</tr>

<tr>
    <td>
        <input type="date" name="checkout">
    </td>
</tr>

<tr>
    <td align="center">
        <br>
        <input type="reset" value="CLEAR">
       <center> &nbsp;&nbsp;

        <a href="PETA5DIAZ-LATORENA.html">
            <input type="button" value="SUBMIT"></center>
        </a>

    </td>
</tr>

</table>

</form>

</body>
</html>
